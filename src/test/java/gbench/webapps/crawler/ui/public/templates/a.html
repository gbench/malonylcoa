<div>
  <div class="highlight">{{name}}[{{component}}]</div>
  <hr />
  <div>
    <div>
      <data-table :data="articles" style="width:100%;" />
    </div>
    <hr>
    <div>
      检索 <input type="text" v-model="keyword" @blur="on_srch_click($event)"> &nbsp;
      <button @click="on_srch_click($event)">字段检索</button> &nbsp;
      <button @click="on_srch_click2($event)">布尔检索</button> &nbsp; 资料目录：&nbsp;
      <input type="text" v-model="fileHome" /> &nbsp;
      <button @click="on_index_click($event)">重建索引</button> &nbsp;
      <button @click="on_refresh_click($event)">刷新语料库</button> &nbsp;
      <div v-if="lines.length>0" style="height:300px; overflow: auto;margin:2px; border:solid 1px red;">
        <data-table style="width:100%" :data="lines"
          :tdrender="td=>(n=>td.substr(0,n).replace(/\s+/g,'')+(td.length>n?'...':''))(15).replace(/^[。，]/,'')" />
      </div>
    </div>
  </div>
</div>
